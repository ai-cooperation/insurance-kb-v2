name: Insurance KB Crawl

on:
  schedule:
    # 00:30 UTC = 08:30 UTC+8, 12:30 UTC = 20:30 UTC+8
    - cron: "30 0 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawl pipeline
        env:
          MODELS_PAT: ${{ secrets.MODELS_PAT }}
        run: python run.py

      - name: Build frontend data
        run: |
          python build_frontend_data.py
          python build_wiki_json.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: daily crawl $(date -u +%Y-%m-%d_%H:%M)"
          git pull --rebase origin main || true
          git push

      - name: Deploy to Cloudflare Pages
        run: |
          # Clone cooperation-hub one level above repo root so frontend/package.json's
          # `file:../../cooperation-hub/...` resolves to the same path.
          git clone --depth 1 https://github.com/ai-cooperation/cooperation-hub.git ../cooperation-hub 2>/dev/null || true
          cd frontend
          npm install
          npx vite build
          npx wrangler pages deploy dist --project-name insurance-kb-v2 --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-1003856903916"
          TELEGRAM_TOPIC_ID: "4"
        run: |
          MSG=$'\xf0\x9f\x9a\xa8 Insurance KB crawl 失敗\nRun: ${{ github.run_id }}\nTrigger: ${{ github.event_name }}\nURL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d message_thread_id="${TELEGRAM_TOPIC_ID}" \
            --data-urlencode text="${MSG}" > /dev/null
