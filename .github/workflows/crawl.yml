name: Insurance KB Crawl

on:
  schedule:
    # 00:30 UTC = 08:30 UTC+8, 12:30 UTC = 20:30 UTC+8
    - cron: "30 0 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawl pipeline
        env:
          MODELS_PAT: ${{ secrets.MODELS_PAT }}
        run: python run.py

      - name: Copy data to frontend
        run: |
          mkdir -p frontend/public/data
          cp index/master-index.json frontend/public/data/articles.json
          python build_wiki_json.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: daily crawl $(date -u +%Y-%m-%d_%H:%M)"
          git pull --rebase origin main || true
          git push
