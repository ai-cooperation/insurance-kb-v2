<head>
<meta charset="utf-8" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
        },
      }
    }
  };
</script>
<style>
  html, body { height: 100%; }
  body {
    font-family: 'Inter', ui-sans-serif, 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "cv11", "ss01";
  }
  .font-zh { font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', system-ui, sans-serif; }
  .text-balance { text-wrap: balance; }
  .text-pretty { text-wrap: pretty; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.25); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.45); }

  /* Accent variable — overwritten by Tweaks */
  :root {
    --accent-h: 172;
    --accent-s: 85%;
    --accent-l: 33%;
    --accent: hsl(var(--accent-h) var(--accent-s) var(--accent-l));
    --accent-soft: hsl(var(--accent-h) 55% 95%);
    --accent-ring: hsl(var(--accent-h) 70% 45% / 0.35);
  }
  .dark { color-scheme: dark; }
  .dark {
    --accent-soft: hsl(var(--accent-h) 40% 16%);
  }
  .bg-accent { background: var(--accent); }
  .text-accent { color: var(--accent); }
  .border-accent { border-color: var(--accent); }
  .ring-accent { --tw-ring-color: var(--accent-ring); }
  .bg-accent-soft { background: var(--accent-soft); }

  /* Typing caret */
  @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  .caret::after {
    content: '▍'; margin-left: 2px; animation: blink 0.9s infinite; color: var(--accent);
  }

  /* Fade in */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .anim-in { animation: fadeInUp .25s ease-out both; }

  /* Card hover subtle lift */
  .card-hover { transition: box-shadow .15s ease, border-color .15s ease, transform .15s ease; }
</style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/page-home.jsx"></script>
  <script type="text/babel" src="src/page-cards.jsx"></script>
  <script type="text/babel" src="src/page-wiki.jsx"></script>
  <script type="text/babel" src="src/page-chat.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
